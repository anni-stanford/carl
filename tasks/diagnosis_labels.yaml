# 30 hand-labeled failure cases used to validate the diagnosis agent.
#
# Each row: a stylized failed-trajectory description and the *correct*
# artifact attribution. Used by experiments/eval_diagnosis.py to compute
# top-1 / top-3 accuracy for the diagnosis agent vs baselines.
# Top-1 accuracy of CARL diagnosis vs random / most-recently-edited heuristic
# is one of the headline numbers in the paper (E4).

cases:
